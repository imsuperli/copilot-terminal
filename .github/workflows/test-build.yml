name: Test Build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: '构建平台'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - mac
          - windows
  push:
    branches:
      - test-build-*

permissions:
  contents: write

jobs:
  build-mac:
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'mac' }}
    runs-on: macos-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          package-manager-cache: false

      - name: Upgrade npm to v11
        working-directory: ${{ runner.temp }}
        run: npm install --global npm@11.11.1

      - name: Install dependencies
        run: npm ci

      - name: Build & Package
        run: npm run dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: mac-installer-test
          path: release/*.dmg
          retention-days: 7

  build-windows:
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'windows' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          package-manager-cache: false

      - name: Upgrade npm to v11
        working-directory: ${{ runner.temp }}
        run: npm install --global npm@11.11.1

      - name: Install dependencies
        run: npm ci

      - name: Build & Package
        run: npm run dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: windows-installer-test
          path: release/*.exe
          retention-days: 7
