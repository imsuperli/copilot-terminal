appId: com.copilot.terminal
productName: Copilot-Terminal
publish: null
directories:
  output: release
  buildResources: resources
files:
  - dist/**/*
  - resources/**/*
  - package.json
  - node_modules/**/*
asarUnpack:
  - dist/statusline/**/*
  - resources/bin/**/*
npmRebuild: false
buildDependenciesFromSource: false
win:
  icon: resources/icon.png
  target:
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
mac:
  icon: resources/icon.png
  category: public.app-category.developer-tools
linux:
  icon: resources/icon.png
  category: Development
